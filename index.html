<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beleza em Jogo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --orange:#FF6600; --orange-d:#cc5200; --orange-xl:#fff0e6;
  --dark:#1C1C1C; --muted:#888; --line:rgba(0,0,0,.08);
  --green-ok:#1a7a3a; --red-err:#cc2200;
  --bg:#FF6600; --r:10px;
  --shadow:0 2px 12px rgba(0,0,0,.10);
  --shadow-lg:0 8px 32px rgba(0,0,0,.18);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh;}

/* ── SCREENS ── */
.screen{display:none;min-height:100vh;flex-direction:column;align-items:center;}
.screen.active{display:flex;}
#setupScreen{padding:36px 16px;}
#gameScreen{padding:0;align-items:stretch;min-height:100vh;}
#victoryScreen{background:var(--orange);justify-content:center;align-items:center;gap:14px;padding:40px 16px;text-align:center;}

/* ── BRAND ── */
.brand{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.brand-logo{font-size:clamp(1.8rem,5vw,2.8rem);font-weight:900;color:#fff;letter-spacing:-1px;line-height:1;}
.brand-logo span{color:var(--dark);}
.brand-sub{font-size:.78rem;font-weight:600;color:rgba(255,255,255,.7);letter-spacing:.5px;text-transform:uppercase;}
.setup-tagline{font-size:.85rem;color:rgba(255,255,255,.7);margin-bottom:28px;}

/* ── CARD ── */
.card{background:#fff;border-radius:var(--r);padding:24px;width:100%;max-width:700px;box-shadow:var(--shadow-lg);margin-bottom:16px;}
.card-title{font-size:.85rem;font-weight:700;color:var(--dark);margin-bottom:14px;text-transform:uppercase;letter-spacing:.8px;display:flex;align-items:center;gap:8px;}
.card-title span{color:var(--orange);}
label{font-size:.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:5px;}
input[type=text],textarea,select{width:100%;background:#f7f7f7;border:1.5px solid #e0e0e0;border-radius:7px;padding:8px 12px;color:var(--dark);font-family:'Inter',sans-serif;font-size:.88rem;font-weight:500;outline:none;transition:border-color .15s;margin-bottom:12px;}
input:focus,textarea:focus,select:focus{border-color:var(--orange);}
textarea{resize:vertical;min-height:60px;}

/* ── BUTTONS ── */
.btn{background:var(--orange);color:#fff;font-family:'Inter',sans-serif;font-size:.82rem;font-weight:700;letter-spacing:.4px;text-transform:uppercase;border:none;border-radius:7px;padding:10px 20px;cursor:pointer;transition:background .15s,transform .1s;}
.btn:hover{background:var(--orange-d);}
.btn:active{transform:scale(.98);}
.btn.ghost{background:transparent;color:var(--orange);border:1.5px solid var(--orange);}
.btn.ghost:hover{background:var(--orange-xl);}
.btn.green{background:#1a6b4a;box-shadow:0 4px 14px rgba(26,107,74,.3);}
.btn.white{background:#fff;color:var(--orange);}
.btn.confirm{background:var(--green-ok);}
.btn.sm{font-size:.75rem;padding:7px 14px;}
.btn.lg{width:100%;max-width:700px;font-size:.9rem;padding:13px;}

/* ── TEAMS SETUP ── */
.teams-wrap{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
.team-chip{display:flex;align-items:center;gap:7px;background:#f7f7f7;border:1.5px solid #e0e0e0;border-radius:50px;padding:5px 12px;font-size:.8rem;font-weight:600;cursor:pointer;transition:border-color .15s;}
.team-chip:hover{border-color:var(--orange);}
.chip-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;}
.chip-rm{cursor:pointer;color:var(--muted);font-size:1rem;line-height:1;margin-left:2px;}
.chip-rm:hover{color:var(--red-err);}

/* ── QUESTION BLOCKS ── */
.q-block{background:#f9f9f9;border-radius:8px;padding:14px;margin-bottom:12px;border-left:3px solid var(--orange);}
.q-block-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.q-block-num{font-size:.75rem;font-weight:700;color:var(--orange);text-transform:uppercase;letter-spacing:.5px;}
.opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin:7px 0 0;}
.opt-row{display:flex;align-items:center;gap:6px;}
.opt-letter{font-size:.72rem;font-weight:800;color:var(--orange);width:14px;flex-shrink:0;}
.opt-row input{margin-bottom:0;}

/* ── LANG TOGGLE ── */
.lang-toggle{display:flex;gap:0;border-radius:6px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.15);flex-shrink:0;}
.lang-btn{background:rgba(255,255,255,.22);color:#fff;font-family:'Inter',sans-serif;font-size:.72rem;font-weight:700;border:none;padding:5px 11px;cursor:pointer;transition:background .15s;}
.lang-btn.active{background:#fff;color:var(--orange);}
.lang-btn:hover:not(.active){background:rgba(255,255,255,.38);}

/* ══════════════════════════════════
   GAME SCREEN
══════════════════════════════════ */

/* TOP BAR */
.topbar{
  background:var(--orange);
  padding:9px 14px;
  display:flex;align-items:center;gap:10px;
  flex-wrap:wrap;
  position:sticky;top:0;z-index:50;
  box-shadow:0 2px 8px rgba(0,0,0,.2);
}
.topbar-logo{font-size:1.1rem;font-weight:900;color:#fff;letter-spacing:-.5px;white-space:nowrap;}
.topbar-logo span{color:var(--dark);}
.topbar-ranking{display:flex;flex-wrap:wrap;gap:5px;flex:1;}
.rank-chip{
  display:flex;align-items:center;gap:5px;
  background:rgba(255,255,255,.18);border-radius:50px;
  padding:3px 10px;font-size:.72rem;font-weight:700;color:#fff;
  border:1.5px solid rgba(255,255,255,.15);white-space:nowrap;
  transition:background .2s;
}
.rank-chip.active-turn{background:rgba(255,255,255,.35);border-color:#fff;}
.rank-chip .rc-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.rank-chip .rc-level{font-size:.8rem;}

/* GAME BODY — 3 column layout, no scroll */
.game-body{
  display:grid;
  grid-template-columns:1fr 280px 220px;
  grid-template-rows:1fr;
  gap:12px;
  padding:12px;
  flex:1;
  min-height:0;
  max-width:1300px;
  width:100%;
  margin:0 auto;
  align-self:stretch;
}

/* WAR BOARD (left) */
.board-wrap{
  background:#fff;border-radius:var(--r);
  padding:12px;box-shadow:var(--shadow);
  display:flex;flex-direction:column;
  min-height:0;overflow:hidden;
}
.board-grid{
  display:grid;gap:3px;
  flex:1;
}
/* CELLS */
.cell{
  border-radius:7px;aspect-ratio:1;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:default;position:relative;
  transition:transform .12s,box-shadow .12s;
  border:1.5px solid #e8e8e8;
  background:#fff;
  min-width:0;
  user-select:none;
}
.cell.start{background:var(--dark);border-color:var(--dark);color:#fff;cursor:default;}
.cell.open{border:2px solid var(--orange);background:#fff8f4;}
.cell.solved{color:#fff;border-color:transparent;}
.cell.active-q{border:2.5px solid var(--dark)!important;box-shadow:0 0 0 3px rgba(28,28,28,.15);z-index:2;}
.cell-num{font-size:clamp(.55rem,1.3vw,.95rem);font-weight:800;color:#ccc;line-height:1;}
.cell.open .cell-num{color:var(--orange);}
.cell.solved .cell-num{color:rgba(255,255,255,.85);}
.cell.start .cell-num,.cell.finish .cell-num{color:rgba(255,255,255,.8);font-size:.65rem;}
.cell-icon{font-size:clamp(.7rem,1.6vw,1.1rem);line-height:1;}

/* MIDDLE — question + sorteador */
.mid-panel{display:flex;flex-direction:column;gap:10px;min-height:0;}
.panel-card{background:#fff;border-radius:var(--r);padding:14px;box-shadow:var(--shadow);}
.panel-title{font-size:.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid var(--line);}

/* SORTEADOR */
.sorteador-wrap{display:flex;flex-direction:column;gap:8px;}
.turn-who{font-size:.75rem;color:var(--muted);font-weight:500;}
.turn-name{font-size:1rem;font-weight:800;margin-bottom:6px;min-height:22px;}
.numbers-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;margin-bottom:8px;}
.num-btn{
  aspect-ratio:1;border-radius:6px;border:none;
  background:#f0f0f0;color:var(--dark);
  font-family:'Inter',sans-serif;font-size:.8rem;font-weight:700;
  cursor:pointer;transition:background .12s,transform .1s;
  display:flex;align-items:center;justify-content:center;
}
.num-btn:hover{background:#e0e0e0;transform:scale(1.06);}
.num-btn.picked{background:var(--orange);color:#fff;transform:scale(1.1);box-shadow:0 3px 10px rgba(255,102,0,.4);}
.num-btn.conquered{background:#e8e8e8;color:#ccc;cursor:not-allowed;text-decoration:line-through;}
.num-btn.disabled{pointer-events:none;opacity:.4;}

/* INLINE QUESTION */
.q-panel-badge{display:inline-block;background:var(--orange);color:#fff;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:2px 9px;border-radius:4px;margin-bottom:8px;}
.q-panel-team{font-size:.78rem;font-weight:700;margin-bottom:6px;}
.q-panel-text{font-size:.88rem;font-weight:700;color:var(--dark);line-height:1.5;margin-bottom:10px;}
.q-opts{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;}
.opt-btn{background:#f7f7f7;border:1.5px solid #e5e5e5;border-radius:8px;padding:8px 12px;font-family:'Inter',sans-serif;font-size:.82rem;font-weight:600;color:var(--dark);cursor:pointer;text-align:left;display:flex;gap:8px;align-items:center;transition:border-color .12s,background .12s;}
.opt-btn:hover{border-color:var(--orange);background:var(--orange-xl);}
.opt-btn.correct{background:#e6f5ec;border-color:var(--green-ok);color:var(--green-ok);}
.opt-btn.wrong{background:#fdecea;border-color:var(--red-err);color:var(--red-err);}
.opt-key{font-weight:800;color:var(--orange);width:16px;flex-shrink:0;}
.q-result{font-size:.8rem;font-weight:700;padding:8px 10px;border-radius:6px;margin-bottom:8px;display:none;}
.q-result.ok{background:#e6f5ec;color:var(--green-ok);display:block;}
.q-result.no{background:#fdecea;color:var(--red-err);display:block;}

/* RIGHT — order + undiscovered */
.right-panel{display:flex;flex-direction:column;gap:10px;min-height:0;overflow-y:auto;}
.turn-row{display:flex;align-items:center;gap:7px;padding:5px 7px;border-radius:6px;font-size:.78rem;font-weight:600;margin-bottom:3px;position:relative;}
.turn-row.cur{background:var(--orange-xl);}
.turn-row.done{opacity:.4;}
.tr-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
/* Tooltip */
.turn-row .tr-tooltip{display:none;position:absolute;left:100%;top:50%;transform:translateY(-50%);margin-left:7px;background:var(--dark);color:#fff;font-size:.7rem;font-weight:600;padding:5px 10px;border-radius:6px;white-space:nowrap;box-shadow:0 2px 10px rgba(0,0,0,.25);pointer-events:none;z-index:50;line-height:1.5;}
.turn-row .tr-tooltip::before{content:'';position:absolute;right:100%;top:50%;transform:translateY(-50%);border:5px solid transparent;border-right-color:var(--dark);}
.turn-row:hover .tr-tooltip{display:block;}

.disc-item{display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid #f0f0f0;font-size:.75rem;}
.disc-answer{font-weight:600;color:var(--dark);}
.disc-empty{font-size:.72rem;color:#bbb;font-style:italic;}

/* VICTORY */
.v-trophy{font-size:4rem;animation:vb 1s infinite alternate;}
@keyframes vb{from{transform:translateY(0)}to{transform:translateY(-9px)}}
.v-title{font-size:2rem;font-weight:900;color:#fff;letter-spacing:-1px;}
.v-sub{font-size:.9rem;color:rgba(255,255,255,.8);margin-bottom:4px;}
.podium{width:100%;max-width:400px;display:flex;flex-direction:column;gap:6px;}
.podium-row{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.15);border-radius:8px;padding:9px 14px;font-weight:700;font-size:.88rem;color:#fff;}
.podium-row.winner-row{background:rgba(255,255,255,.3);border:2px solid rgba(255,255,255,.5);}
.podium-pos{font-size:1.2rem;font-weight:800;width:28px;}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--dark);color:#fff;font-size:.8rem;font-weight:700;padding:8px 20px;border-radius:50px;z-index:300;animation:tin .25s ease,tout .25s ease 2.1s forwards;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.3);}
@keyframes tin{from{opacity:0;transform:translateX(-50%) translateY(12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes tout{from{opacity:1}to{opacity:0}}

@media(max-width:900px){
  .game-body{grid-template-columns:1fr 240px;grid-template-rows:auto auto;}
  .right-panel{grid-column:1/-1;flex-direction:row;flex-wrap:wrap;overflow-y:visible;}
  .right-panel .panel-card{flex:1 1 180px;}
}
@media(max-width:600px){
  .game-body{grid-template-columns:1fr;grid-template-rows:auto;}
  .mid-panel,.right-panel{grid-column:1;}
}
</style>
</head>
<body>

<!-- ══ SETUP ══ -->
<div id="setupScreen" class="screen active">
  <div style="width:100%;max-width:700px;padding-bottom:6px;">
    <div class="brand">
      <div>
        <div class="brand-logo">Beleza<span> em Jogo</span></div>
        <div class="brand-sub">Jogo de Tabuleiro</div>
      </div>
      <div class="lang-toggle">
        <button class="lang-btn active" id="btnPT" onclick="setLang('pt')">PT</button>
        <button class="lang-btn" id="btnES" onclick="setLang('es')">ES</button>
      </div>
    </div>
    <div class="setup-tagline" id="setupTagline">Relacionamento e Ativação Comercial</div>
  </div>

  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
      <div class="card-title" style="margin-bottom:0" id="card1Title"><span>01</span> Equipes</div>
      <button class="btn sm green" id="btnStartGame" onclick="startGame()">▶ Iniciar Jogo</button>
    </div>
    <div class="teams-wrap" id="teamsList"></div>
    <div id="membersEditor" style="margin-top:14px;"></div>
  </div>

  <div class="card">
    <div class="card-title" id="card2Title"><span>02</span> Perguntas</div>
    <p style="font-size:.78rem;color:var(--muted);margin-bottom:12px;" id="card2Desc">Cada pergunta deve ter 5 opções (A–E) e um gabarito definido.</p>
    <div id="questionBlocks"></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn ghost sm" onclick="addQuestion()" id="btnAddQ">+ Adicionar Pergunta</button>
      <button class="btn sm" onclick="fillSampleQuestions()" id="btnSample">⚡ Carregar Perguntas de Teste</button>
    </div>
    <p id="qCount" style="font-size:.72rem;color:var(--muted);margin-top:8px;"></p>
  </div>
  <p id="startError" style="font-size:.82rem;color:#fff;background:rgba(0,0,0,.2);padding:8px 14px;border-radius:6px;display:none;max-width:700px;width:100%;text-align:center;"></p>
</div>

<!-- ══ GAME ══ -->
<div id="gameScreen" class="screen">

  <!-- TOP BAR: logo + ranking left-to-right + lang toggle -->
  <div class="topbar">
    <div class="topbar-logo">Beleza<span> em Jogo</span></div>
    <div class="topbar-ranking" id="topbarRanking"></div>
    <div class="lang-toggle" style="margin-left:6px;">
      <button class="lang-btn" id="btnPT2" onclick="setLang('pt')">PT</button>
      <button class="lang-btn" id="btnES2" onclick="setLang('es')">ES</button>
    </div>
  </div>

  <div class="game-body">

    <!-- LEFT: War board -->
    <div class="board-wrap">
      <div class="board-grid" id="boardGrid"></div>
    </div>

    <!-- MIDDLE: Sorteador + Question -->
    <div class="mid-panel">

      <!-- Sorteador -->
      <div class="panel-card">
        <div class="panel-title" id="panelSortTitle">Sorteio de Casa</div>
        <div class="turn-who" id="turnWho">Vez de:</div>
        <div class="turn-name" id="turnName">—</div>
        <div class="numbers-grid" id="numbersGrid"></div>
        <div id="sortResult" style="font-size:.82rem;font-weight:700;color:var(--orange);min-height:20px;margin-bottom:6px;text-align:center;"></div>
        <button class="btn" id="btnSortear" onclick="autoSort()" style="width:100%">🎲 Sortear Casa!</button>
      </div>

      <!-- Question Panel -->
      <div class="panel-card" id="questionPanel" style="display:none;">
        <div class="q-panel-badge" id="qBadge">Casa 1</div>
        <div class="q-panel-team" id="qTeam"></div>
        <div class="q-panel-text" id="qText"></div>
        <div class="q-opts" id="qOpts"></div>
        <div class="q-result" id="qResult"></div>
        <div id="qActions"></div>
      </div>

    </div>

    <!-- RIGHT: Turn order + Undiscovered -->
    <div class="right-panel">
      <div class="panel-card">
        <div class="panel-title" id="panelOrderTitle">Ordem de Jogo</div>
        <div id="turnOrderList"></div>
      </div>
      <div class="panel-card">
        <div class="panel-title" id="panelUndiscTitle">Ainda não descobertos</div>
        <div id="undiscoveredList"><div class="disc-empty">—</div></div>
      </div>
    </div>

  </div>
</div>

<!-- ══ VICTORY ══ -->
<div id="victoryScreen" class="screen">
  <div class="v-trophy">🏆</div>
  <div class="v-title" id="vTitle">Jogo Concluído!</div>
  <div class="v-sub" id="vSub">Todas as casas foram respondidas</div>
  <div class="podium" id="podium"></div>
  <div id="victoryUndiscovered"></div>
  <button class="btn white" onclick="resetGame()" style="margin-top:20px;" id="btnReset">↺ Jogar Novamente</button>
</div>

<script>
// ══════════════════════════════════════════════════════
//  LANGUAGE (declared first — no hoisting issues)
// ══════════════════════════════════════════════════════
let LANG = 'pt';
const UI = {
  brandLogo:     {pt:'Beleza<span> em Jogo</span>',          es:'Belleza<span> en Juego</span>'},
  setupTagline:  {pt:'Relacionamento e Ativação Comercial', es:'Relacionamiento y Activación Comercial'},
  card1Title:    {pt:'<span>01</span> Equipes',              es:'<span>01</span> Equipos'},
  card2Title:    {pt:'<span>02</span> Perguntas',            es:'<span>02</span> Preguntas'},
  card2Desc:     {pt:'Cada pergunta deve ter 5 opções (A–E) e um gabarito definido.', es:'Cada pregunta debe tener 5 opciones (A–E) y una respuesta correcta.'},
  btnAddQ:       {pt:'+ Adicionar Pergunta',                 es:'+ Agregar Pregunta'},
  btnSample:     {pt:'⚡ Carregar Perguntas de Teste',        es:'⚡ Cargar Preguntas de Prueba'},
  btnStart:      {pt:'▶ Iniciar Jogo',                       es:'▶ Iniciar Juego'},
  panelSort:     {pt:'Sorteio de Casa',                      es:'Sorteo de Casilla'},
  turnWho:       {pt:'Vez de:',                              es:'Turno de:'},
  panelOrder:    {pt:'Ordem de Jogo',                        es:'Orden de Juego'},
  panelUndisc:   {pt:'Ainda não descobertos',               es:'Aún no descubiertos'},
  allDiscovered: {pt:'Todos descobertos! 🎉',                es:'¡Todos descubiertos! 🎉'},
  vTitle:        {pt:'Jogo Concluído!',                      es:'¡Juego Completado!'},
  vSub:          {pt:'Todas as casas foram respondidas',     es:'Todas las casillas fueron respondidas'},
  btnReset:      {pt:'↺ Jogar Novamente',                    es:'↺ Jugar de Nuevo'},
  cellStart:     {pt:'Início',                               es:'Inicio'},
  resultOk:      {pt:(n,c)=>`✓ Correto! ${n} conquista a casa ${c}!`, es:(n,c)=>`✓ ¡Correcto! ${n} conquista la casilla ${c}!`},
  resultNo:      {pt:'✗ Resposta incorreta. Vez do próximo!', es:'✗ Respuesta incorrecta. ¡Turno del siguiente!'},
  continueBtn:   {pt:'Continuar →',                          es:'Continuar →'},
  labelEnunc:    {pt:'Enunciado',                            es:'Enunciado'},
  labelOpts:     {pt:'Opções (A–E)',                         es:'Opciones (A–E)'},
  labelGab:      {pt:'Gabarito',                             es:'Respuesta correcta'},
  placeholderQ:  {pt:'Escreva a pergunta...',                es:'Escribe la pregunta...'},
  placeholderM:  {pt:'Nome do participante',                 es:'Nombre del participante'},
  membTitle:     {pt:'Participantes',                        es:'Participantes'},
  pessoas:       {pt:'pessoas',                              es:'personas'},
  toastSample:   {pt:'24 perguntas de teste carregadas ✓',   es:'24 preguntas de prueba cargadas ✓'},
  toastAll:      {pt:'Todas as casas foram respondidas!',    es:'¡Todas las casillas fueron respondidas!'},
  sortedHouse:   {pt:(n)=>`Casa ${n} sorteada!`,             es:(n)=>`¡Casilla ${n} sorteada!`},
  btnSortear:    {pt:'🎲 Sortear Casa!',                      es:'🎲 ¡Sortear Casilla!'},
  qBlockLabel:   {pt:(n)=>`Casa ${n}`,                       es:(n)=>`Casilla ${n}`},
  qPanelLabel:   {pt:(n)=>`Casa ${n}`,                       es:(n)=>`Casilla ${n}`},
  winnerIs:      {pt:(n)=>`🎉 Vencedor: ${n}!`,              es:(n)=>`🎉 ¡Ganador: ${n}!`},
  acertos:       {pt:(n)=>`${n} acerto${n!==1?'s':''}`,      es:(n)=>`${n} acierto${n!==1?'s':''}`},
};
function tr(key,...args){
  const e=UI[key]; if(!e) return key;
  const v=e[LANG]||e.pt;
  return typeof v==='function'?v(...args):v;
}
function setLang(lang){
  LANG=lang;
  ['btnPT','btnPT2'].forEach(id=>{const el=document.getElementById(id);if(el)el.classList.toggle('active',lang==='pt');});
  ['btnES','btnES2'].forEach(id=>{const el=document.getElementById(id);if(el)el.classList.toggle('active',lang==='es');});
  applyStaticLang();
  if(gameState){renderTopbarRanking();renderTurnOrder();renderUndiscovered();renderBoard();}
  rerenderQBlocks();
}
function applyStaticLang(){
  const s=(id,html)=>{const el=document.getElementById(id);if(el)el.innerHTML=html;};
  const t=(id,txt)=>{const el=document.getElementById(id);if(el)el.textContent=txt;};
  // Logo (all instances)
  document.querySelectorAll('.brand-logo,.topbar-logo').forEach(el=>el.innerHTML=tr('brandLogo'));
  // Page title
  document.title=LANG==='es'?'Belleza en Juego':'Beleza em Jogo';
  s('card1Title',tr('card1Title')); s('card2Title',tr('card2Title')); s('card2Desc',tr('card2Desc'));
  t('setupTagline',tr('setupTagline')); t('btnAddQ',tr('btnAddQ')); t('btnSample',tr('btnSample'));
  t('btnStartGame',tr('btnStart'));
  t('panelSortTitle',tr('panelSort')); t('turnWho',tr('turnWho'));
  t('btnSortear',tr('btnSortear'));
  t('panelOrderTitle',tr('panelOrder')); t('panelUndiscTitle',tr('panelUndisc'));
  t('vTitle',tr('vTitle')); t('vSub',tr('vSub')); t('btnReset',tr('btnReset'));
}

function buildSampleQuestions(){
  return RAW_QA.map((item,i)=>{
    const pos=i%5;
    const others=POOL.filter(p=>p!==item.correct);
    for(let j=others.length-1;j>0;j--){const k=Math.floor(Math.random()*(j+1));[others[j],others[k]]=[others[k],others[j]];}
    const arr=[...others.slice(0,4)];
    arr.splice(pos,0,item.correct);
    const opts={};
    LETTERS.forEach((l,li)=>{opts[l]=arr[li];});
    return{pt:item.pt,es:item.es,text:item.pt,opts,correct:LETTERS[pos]};
  });
}

let teams=[], questions=[], gameState=null;
let qCount=0, openEditorId=null;

function initTeams(){
  teams=FIXED_TEAMS.map((t,i)=>({
    ...t, id:i+1,
    members:['Membro 1','Membro 2','Membro 3','Membro 4'],
  }));
  renderTeams(); renderMembersEditor();
}
function renderTeams(){
  document.getElementById('teamsList').innerHTML=teams.map(tm=>`
    <div class="team-chip" onclick="toggleEditor(${tm.id})">
      <div class="chip-dot" style="background:${tm.color}"></div>
      <span style="font-weight:800">${tm.name}</span>
      <span style="font-size:.68rem;color:var(--muted);margin-left:3px">${tm.members.filter(m=>m.trim()).length} ${tr('pessoas')}</span>
      <span style="font-size:.78rem;color:var(--muted)">▾</span>
      <span class="chip-rm" onclick="event.stopPropagation();removeTeam(${tm.id})">×</span>
    </div>`).join('');
}
function removeTeam(id){
  teams=teams.filter(t=>t.id!==id);
  if(openEditorId===id)openEditorId=null;
  renderTeams(); renderMembersEditor();
}
function toggleEditor(id){openEditorId=openEditorId===id?null:id;renderMembersEditor();}
function renderMembersEditor(){
  const el=document.getElementById('membersEditor');
  if(!openEditorId){el.innerHTML='';return;}
  const tm=teams.find(x=>x.id===openEditorId);
  if(!tm){el.innerHTML='';return;}
  el.innerHTML=`
    <div style="background:#f7f7f7;border-radius:8px;padding:12px;border-left:3px solid ${tm.color}">
      <div style="font-size:.72rem;font-weight:800;color:${tm.color};text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px">${tm.name} — ${tr('membTitle')}</div>
      ${tm.members.map((m,i)=>`
        <div style="display:flex;align-items:center;gap:7px;margin-bottom:5px">
          <span style="font-size:.7rem;font-weight:700;color:var(--muted);width:14px">${i+1}.</span>
          <input type="text" value="${m}" oninput="updateMember(${tm.id},${i},this.value)"
            placeholder="${tr('placeholderM')}" style="margin-bottom:0;flex:1;padding:5px 9px;font-size:.8rem;">
        </div>`).join('')}
    </div>`;
}
function updateMember(teamId,idx,val){
  const tm=teams.find(x=>x.id===teamId);
  if(tm)tm.members[idx]=val;
}

function addQuestion(data){
  if(qCount>=24){toast('Máximo 24 perguntas');return;}
  qCount++;const n=qCount;
  const d=document.createElement('div');
  d.className='q-block';d.id=`qb_${n}`;
  d.innerHTML=`
    <div class="q-block-header">
      <span class="q-block-num">${tr('qBlockLabel',n)}</span>
      <button class="btn sm" style="background:var(--red-err)" onclick="rmQ(${n})">✕</button>
    </div>
    <label>${tr('labelEnunc')}</label>
    <textarea id="qt_${n}" placeholder="${tr('placeholderQ')}">${data?.[LANG]||data?.pt||''}</textarea>
    <label style="margin-bottom:6px">${tr('labelOpts')}</label>
    <div class="opts-grid">
      ${LETTERS.map((l,li)=>`
        <div class="opt-row">
          <span class="opt-letter">${l}</span>
          <input type="text" id="qo_${n}_${l}" placeholder="${LANG==='pt'?'Opção':'Opción'} ${l}" value="${data?.opts?.[l]||data?.opts?.[li]||''}">
        </div>`).join('')}
    </div>
    <div style="margin-top:8px">
      <label>${tr('labelGab')}</label>
      <select id="qc_${n}" style="margin-bottom:0">
        ${LETTERS.map(l=>`<option value="${l}"${(data?.correct||data?.c)===l?' selected':''}>${l}</option>`).join('')}
      </select>
    </div>`;
  document.getElementById('questionBlocks').appendChild(d);
  updateQCount();
}
function rmQ(n){const el=document.getElementById(`qb_${n}`);if(el)el.remove();updateQCount();}
function updateQCount(){
  const n=document.querySelectorAll('.q-block').length;
  const el=document.getElementById('qCount');
  el.textContent=`${n}/24 ${LANG==='pt'?'perguntas cadastradas':'preguntas registradas'}`;
  el.style.color=n===24?'#2e8b3a':'#888';
}
function fillSampleQuestions(){
  document.getElementById('questionBlocks').innerHTML='';qCount=0;
  buildSampleQuestions().forEach(s=>addQuestion(s));
  toast(tr('toastSample'));
}
function collectQ(){
  return Array.from(document.querySelectorAll('.q-block')).map(b=>{
    const n=b.id.split('_')[1];
    const text=document.getElementById(`qt_${n}`).value.trim();
    const opts={};LETTERS.forEach(l=>{opts[l]=document.getElementById(`qo_${n}_${l}`)?.value?.trim()||'';});
    const correct=document.getElementById(`qc_${n}`).value;
    const srcQ=questions[parseInt(n)-1];
    return{pt:srcQ?.pt||text, es:srcQ?.es||text, text, opts, correct};
  }).filter(q=>q.text);
}
function rerenderQBlocks(){
  document.querySelectorAll('.q-block').forEach(block=>{
    const n=block.id.split('_')[1];
    const numEl=block.querySelector('.q-block-num');
    if(numEl)numEl.textContent=tr('qBlockLabel',n);
    const labels=block.querySelectorAll('label');
    if(labels[0])labels[0].textContent=tr('labelEnunc');
    if(labels[1])labels[1].textContent=tr('labelOpts');
    if(labels[2])labels[2].textContent=tr('labelGab');
    const ta=block.querySelector('textarea');
    if(ta){ta.placeholder=tr('placeholderQ');const srcQ=questions[parseInt(n)-1];if(srcQ)ta.value=srcQ[LANG]||srcQ.pt||ta.value;}
    LETTERS.forEach(l=>{const inp=document.getElementById(`qo_${n}_${l}`);if(inp)inp.placeholder=`${LANG==='pt'?'Opção':'Opción'} ${l}`;});
  });
}

// ══════════════════════════════════════════════════════
//  START GAME
// ══════════════════════════════════════════════════════
function startGame(){
  const err=document.getElementById('startError');
  err.style.display='none';
  if(teams.length<1){showErr(LANG==='pt'?'Adicione pelo menos 1 equipe.':'Agrega al menos 1 equipo.');return;}
  questions=collectQ();
  if(questions.length<24){showErr(`${LANG==='pt'?'Cadastre':'Registra'} 24 ${LANG==='pt'?'perguntas':'preguntas'} (${questions.length}/24).`);return;}

  const order=[...teams].sort(()=>Math.random()-.5);

  gameState={
    teams:teams.map(tm=>({...tm, acertos:0, pos:0, finished:false})),
    order:order.map(tm=>tm.id),
    curIdx:0,
    cells:Array.from({length:BOARD_SIZE},(_,i)=>({
      num:i+1, solved:false, open:false, solvedByTeam:null, answerText:''
    })),
    picked:null,       // currently picked house number (1-24)
    answered:false,    // whether current question was answered
    gameOver:false,
  };

  showScreen('gameScreen');
  renderBoard();
  renderTopbarRanking();
  renderTurnOrder();
  renderUndiscovered();
  renderNumbersGrid();
  updateTurnLabel();
}
function showErr(msg){const e=document.getElementById('startError');e.textContent=msg;e.style.display='block';}

// ══════════════════════════════════════════════════════
//  BOARD (war map — 6 cols × 4 rows, straight 1→24)
// ══════════════════════════════════════════════════════
function renderBoard(){
  const grid=document.getElementById('boardGrid');
  grid.style.gridTemplateColumns=`repeat(${COLS},1fr)`;
  grid.innerHTML='';
  for(let cellNum=1;cellNum<=BOARD_SIZE;cellNum++){
    const el=document.createElement('div');
    const cell=gameState.cells[cellNum-1];
    el.id=`cell_${cellNum}`;
    el.className='cell'+(cell.solved?' solved':'')+(cell.open&&!cell.solved?' open':'')+(gameState.picked===cellNum?' active-q':'');
    if(cell.solved&&cell.solvedByTeam) el.style.background=cell.solvedByTeam.color;
    const icon=cell.solved?'✅':(cell.open?'❓':'');
    const numColor=cell.solved?'rgba(255,255,255,.85)':cell.open?'var(--orange)':'#ccc';
    el.innerHTML=`<div class="cell-icon">${icon}</div><div class="cell-num" style="color:${numColor}">${cellNum}</div>`;
    grid.appendChild(el);
  }
}
function refreshCell(cellNum){
  const el=document.getElementById(`cell_${cellNum}`);
  if(!el)return;
  const cell=gameState.cells[cellNum-1];
  el.className='cell'+(cell.solved?' solved':'')+(cell.open&&!cell.solved?' open':'')+(gameState.picked===cellNum?' active-q':'');
  el.style.background=cell.solved&&cell.solvedByTeam?cell.solvedByTeam.color:'';
  const icon=cell.solved?'✅':(cell.open?'❓':'');
  const numColor=cell.solved?'rgba(255,255,255,.85)':cell.open?'var(--orange)':'#ccc';
  el.innerHTML=`<div class="cell-icon">${icon}</div><div class="cell-num" style="color:${numColor}">${cellNum}</div>`;
}

// ══════════════════════════════════════════════════════
//  SORTEADOR (auto-random)
// ══════════════════════════════════════════════════════
function renderNumbersGrid(){
  // Show remaining available numbers as small read-only chips
  const grid=document.getElementById('numbersGrid');
  grid.innerHTML='';
  for(let n=1;n<=24;n++){
    const cell=gameState.cells[n-1];
    const chip=document.createElement('div');
    chip.className='num-btn'+(cell.solved?' conquered':'')+(gameState.picked===n?' picked':'');
    chip.textContent=n;
    chip.style.cursor='default';
    chip.style.pointerEvents='none';
    if(cell.solved) chip.style.opacity='.35';
    grid.appendChild(chip);
  }
  // Enable/disable button
  const btn=document.getElementById('btnSortear');
  if(btn){
    const hasPicked=gameState.picked!==null;
    btn.disabled=hasPicked;
    btn.style.opacity=hasPicked?'.45':'1';
    btn.style.cursor=hasPicked?'not-allowed':'pointer';
  }
}

function autoSort(){
  if(gameState.picked!==null) return;
  // Get all unsolved houses
  const available=gameState.cells
    .map((c,i)=>c.solved?null:i+1)
    .filter(n=>n!==null);
  if(!available.length) return;

  // Pick random
  const n=available[Math.floor(Math.random()*available.length)];
  gameState.picked=n;
  gameState.cells[n-1].open=true;
  document.getElementById('sortResult').textContent=tr('sortedHouse',n);
  renderNumbersGrid();
  refreshCell(n);
  openQuestion(n);
}

// ══════════════════════════════════════════════════════
//  QUESTION
// ══════════════════════════════════════════════════════
let mState={};
function openQuestion(cellNum){
  const q=questions[cellNum-1];
  const team=currentTeam();
  mState={cellNum,team,answered:false};
  document.getElementById('qBadge').textContent=tr('qPanelLabel',cellNum);
  document.getElementById('qTeam').textContent=team.name;
  document.getElementById('qTeam').style.color=team.color;
  document.getElementById('qText').textContent=q[LANG]||q.pt||q.text||'';
  document.getElementById('qResult').className='q-result';
  document.getElementById('qResult').textContent='';
  document.getElementById('qOpts').innerHTML=LETTERS.map(l=>`
    <button class="opt-btn" id="ob_${l}" onclick="answerQ('${l}')">
      <span class="opt-key">${l}</span>
      <span>${q.opts[l]||'—'}</span>
    </button>`).join('');
  document.getElementById('qActions').innerHTML='';
  document.getElementById('questionPanel').style.display='block';
}

function answerQ(chosen){
  if(mState.answered)return;
  mState.answered=true;
  gameState.answered=true;
  const q=questions[mState.cellNum-1];
  const team=mState.team;
  const correct=q.correct;

  // Disable buttons
  LETTERS.forEach(l=>{
    const b=document.getElementById(`ob_${l}`);
    if(b){
      b.onclick=null;
      if(chosen===correct){if(l===correct)b.classList.add('correct');}
      else{if(l===chosen)b.classList.add('wrong');}
    }
  });

  const r=document.getElementById('qResult');
  r.style.display='block'; // force show before setting class

  if(chosen===correct){
    r.textContent=tr('resultOk',team.name,mState.cellNum);
    r.className='q-result ok';
    const ansText=q.opts[correct]||correct;
    // Update cell
    gameState.cells[mState.cellNum-1].solved=true;
    gameState.cells[mState.cellNum-1].solvedByTeam={name:team.name,color:team.color};
    gameState.cells[mState.cellNum-1].answerText=ansText;
    // Update team score
    const gs_team=gameState.teams.find(t=>t.id===team.id);
    if(gs_team)gs_team.acertos++;
    refreshCell(mState.cellNum);
    renderTopbarRanking();
    renderTurnOrder();
    renderUndiscovered();
  } else {
    r.textContent=tr('resultNo');
    r.className='q-result no';
    // Cell stays open (available for re-draw) but not solved
  }

  document.getElementById('qActions').innerHTML=`
    <button class="btn confirm sm" style="width:100%" onclick="continueGame()">${tr('continueBtn')}</button>`;
}

function continueGame(){
  document.getElementById('questionPanel').style.display='none';
  document.getElementById('sortResult').textContent='';

  // Check if all 24 houses solved
  const allSolved=gameState.cells.every(c=>c.solved);
  if(allSolved){
    toast(tr('toastAll'));
    setTimeout(showVictory,1000);
    return;
  }

  // Advance turn
  gameState.picked=null;
  gameState.answered=false;
  advanceTurn();
  renderBoard(); // refresh active-q highlight
  renderNumbersGrid();
}

// ══════════════════════════════════════════════════════
//  TURNS
// ══════════════════════════════════════════════════════
function currentTeam(){
  if(!gameState)return null;
  const id=gameState.order[gameState.curIdx%gameState.order.length];
  return gameState.teams.find(tm=>tm.id===id);
}
function advanceTurn(){
  const total=gameState.order.length;
  gameState.curIdx=(gameState.curIdx+1)%total;
  updateTurnLabel();
  renderTurnOrder();
}
function updateTurnLabel(){
  const tm=currentTeam();
  const el=document.getElementById('turnName');
  if(el&&tm){el.textContent=tm.name;el.style.color=tm.color;}
}

// ══════════════════════════════════════════════════════
//  TOPBAR RANKING
// ══════════════════════════════════════════════════════
function renderTopbarRanking(){
  const curId=currentTeam()?.id;
  // Sort by acertos desc, then name
  const sorted=[...gameState.teams].sort((a,b)=>b.acertos-a.acertos||(a.name>b.name?1:-1));
  document.getElementById('topbarRanking').innerHTML=sorted.map(tm=>{
    const lv=getLevel(tm.acertos);
    return`<div class="rank-chip${tm.id===curId?' active-turn':''}"
      title="${(tm.members||[]).filter(m=>m.trim()).join(', ')||tm.name}">
      <div class="rc-dot" style="background:${tm.color}"></div>
      <span>${tm.name}</span>
      <span class="rc-level">${lv.emoji}</span>
      <span style="opacity:.7;font-size:.68rem">${tr('acertos',tm.acertos)}</span>
    </div>`;
  }).join('');
}

// ══════════════════════════════════════════════════════
//  TURN ORDER LIST
// ══════════════════════════════════════════════════════
function renderTurnOrder(){
  const curId=currentTeam()?.id;
  document.getElementById('turnOrderList').innerHTML=gameState.order.map(id=>{
    const tm=gameState.teams.find(x=>x.id===id);
    const lv=getLevel(tm.acertos);
    const members=(tm.members||[]).filter(m=>m.trim());
    const tooltip=members.length?`<div class="tr-tooltip">${members.map(m=>`• ${m}`).join('<br>')}</div>`:'';
    return`<div class="turn-row${tm.id===curId?' cur':''}">
      <div class="tr-dot" style="background:${tm.color}"></div>
      <span style="flex:1;font-weight:700">${tm.name}</span>
      <span>${lv.emoji}</span>
      <span style="font-size:.7rem;color:var(--muted)">${tm.acertos}</span>
      ${tooltip}
    </div>`;
  }).join('');
}

// ══════════════════════════════════════════════════════
//  UNDISCOVERED
// ══════════════════════════════════════════════════════
function renderUndiscovered(){
  const unsolved=[];
  for(let i=0;i<BOARD_SIZE;i++){
    const c=gameState.cells[i];
    if(!c.solved){
      const q=questions[i];
      const ans=q?.opts[q?.correct]||'';
      if(ans)unsolved.push(ans);
    }
  }
  const el=document.getElementById('undiscoveredList');
  if(!unsolved.length){el.innerHTML=`<div class="disc-empty">${tr('allDiscovered')}</div>`;return;}
  const shuffled=[...unsolved].sort(()=>Math.random()-.5);
  el.innerHTML=shuffled.map(ans=>`
    <div class="disc-item">
      <span class="disc-answer">${escHtml(ans)}</span>
    </div>`).join('');
}

// ══════════════════════════════════════════════════════
//  VICTORY
// ══════════════════════════════════════════════════════
function showVictory(){
  showScreen('victoryScreen');

  // Ranking by acertos desc
  const sorted=[...gameState.teams].sort((a,b)=>b.acertos-a.acertos||(a.name>b.name?1:-1));
  const winner=sorted[0];
  document.getElementById('vTitle').textContent=tr('vTitle');
  document.getElementById('vSub').textContent=winner?tr('winnerIs',winner.name):'';
  const medals=['🥇','🥈','🥉','4º','5º','6º'];
  document.getElementById('podium').innerHTML=sorted.map((tm,i)=>{
    const lv=getLevel(tm.acertos);
    return`<div class="podium-row${i===0?' winner-row':''}">
      <span class="podium-pos">${medals[i]||`${i+1}º`}</span>
      <div class="tr-dot" style="background:${tm.color};width:13px;height:13px;border-radius:50%;flex-shrink:0"></div>
      <span style="flex:1;font-weight:${i===0?800:600}">${tm.name}</span>
      <span style="font-size:.9rem">${lv.emoji}</span>
      <span style="font-size:.75rem;color:rgba(255,255,255,.7)">${tr('acertos',tm.acertos)}</span>
    </div>`;
  }).join('');

  // Undiscovered people
  const undiscPeople=[];
  for(let i=0;i<BOARD_SIZE;i++){
    const c=gameState.cells[i];
    if(!c.solved){const q=questions[i];const ans=q?.opts[q?.correct]||'';if(ans)undiscPeople.push(ans);}
  }
  const uel=document.getElementById('victoryUndiscovered');
  if(undiscPeople.length){
    uel.innerHTML=`
      <div style="margin-top:18px;max-width:420px;width:100%">
        <div style="font-size:.72rem;font-weight:700;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px">${tr('panelUndisc')}</div>
        <div style="display:flex;flex-wrap:wrap;gap:5px;justify-content:center">
          ${undiscPeople.map(name=>`<span style="background:rgba(255,255,255,.15);color:#fff;padding:4px 11px;border-radius:50px;font-size:.78rem;font-weight:600">${escHtml(name)}</span>`).join('')}
        </div>
      </div>`;
  } else {
    uel.innerHTML=`<div style="margin-top:12px;font-size:.85rem;color:rgba(255,255,255,.7)">${tr('allDiscovered')}</div>`;
  }
}

// ══════════════════════════════════════════════════════
//  RESET
// ══════════════════════════════════════════════════════
function resetGame(){
  questions=[];qCount=0;gameState=null;openEditorId=null;
  document.getElementById('questionBlocks').innerHTML='';
  updateQCount(); initTeams();
  showScreen('setupScreen');
}

// ══════════════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════════════
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function toast(msg){
  const el=document.createElement('div');el.className='toast';el.textContent=msg;
  document.body.appendChild(el);setTimeout(()=>el.remove(),2500);
}
function escHtml(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ══════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════
updateQCount();
initTeams();
applyStaticLang();
</script>
</body>
</html>

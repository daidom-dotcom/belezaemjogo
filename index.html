<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beleza em Jogo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --orange:#FF6600; --orange-d:#cc5200; --orange-xl:#fff0e6;
  --dark:#1C1C1C; --muted:#888; --line:rgba(0,0,0,.08);
  --green-ok:#1a7a3a; --red-err:#cc2200;
  --bg:#FF6600; --r:10px;
  --shadow:0 2px 12px rgba(0,0,0,.10);
  --shadow-lg:0 8px 32px rgba(0,0,0,.18);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh;}

/* ── SCREENS ── */
.screen{display:none;min-height:100vh;flex-direction:column;align-items:center;}
.screen.active{display:flex;}
#setupScreen{padding:36px 16px;}
#gameScreen{padding:0;align-items:stretch;min-height:100vh;}
#victoryScreen{background:var(--orange);justify-content:center;align-items:center;gap:14px;padding:40px 16px;text-align:center;}

/* ── BRAND ── */
.brand{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.brand-logo{font-size:clamp(1.8rem,5vw,2.8rem);font-weight:900;color:#fff;letter-spacing:-1px;line-height:1;}
.brand-logo span{color:var(--dark);}
.brand-sub{font-size:.78rem;font-weight:600;color:rgba(255,255,255,.7);letter-spacing:.5px;text-transform:uppercase;}
.setup-tagline{font-size:.85rem;color:rgba(255,255,255,.7);margin-bottom:28px;}

/* ── CARD ── */
.card{background:#fff;border-radius:var(--r);padding:24px;width:100%;max-width:700px;box-shadow:var(--shadow-lg);margin-bottom:16px;}
.card-title{font-size:.85rem;font-weight:700;color:var(--dark);margin-bottom:14px;text-transform:uppercase;letter-spacing:.8px;display:flex;align-items:center;gap:8px;}
.card-title span{color:var(--orange);}
label{font-size:.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:5px;}
input[type=text],textarea,select{width:100%;background:#f7f7f7;border:1.5px solid #e0e0e0;border-radius:7px;padding:8px 12px;color:var(--dark);font-family:'Inter',sans-serif;font-size:.88rem;font-weight:500;outline:none;transition:border-color .15s;margin-bottom:12px;}
input:focus,textarea:focus,select:focus{border-color:var(--orange);}
textarea{resize:vertical;min-height:60px;}

/* ── BUTTONS ── */
.btn{background:var(--orange);color:#fff;font-family:'Inter',sans-serif;font-size:.82rem;font-weight:700;letter-spacing:.4px;text-transform:uppercase;border:none;border-radius:7px;padding:10px 20px;cursor:pointer;transition:background .15s,transform .1s;}
.btn:hover{background:var(--orange-d);}
.btn:active{transform:scale(.98);}
.btn.ghost{background:transparent;color:var(--orange);border:1.5px solid var(--orange);}
.btn.ghost:hover{background:var(--orange-xl);}
.btn.green{background:#1a6b4a;box-shadow:0 4px 14px rgba(26,107,74,.3);}
.btn.white{background:#fff;color:var(--orange);}
.btn.confirm{background:var(--green-ok);}
.btn.sm{font-size:.75rem;padding:7px 14px;}
.btn.lg{width:100%;max-width:700px;font-size:.9rem;padding:13px;}

/* ── TEAMS SETUP ── */
.teams-wrap{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
.team-chip{display:flex;align-items:center;gap:7px;background:#f7f7f7;border:1.5px solid #e0e0e0;border-radius:50px;padding:5px 12px;font-size:.8rem;font-weight:600;cursor:pointer;transition:border-color .15s;}
.team-chip:hover{border-color:var(--orange);}
.chip-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;}
.chip-rm{cursor:pointer;color:var(--muted);font-size:1rem;line-height:1;margin-left:2px;}
.chip-rm:hover{color:var(--red-err);}

/* ── QUESTION BLOCKS ── */
.q-block{background:#f9f9f9;border-radius:8px;padding:14px;margin-bottom:12px;border-left:3px solid var(--orange);}
.q-block-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.q-block-num{font-size:.75rem;font-weight:700;color:var(--orange);text-transform:uppercase;letter-spacing:.5px;}
.opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin:7px 0 0;}
.opt-row{display:flex;align-items:center;gap:6px;}
.opt-letter{font-size:.72rem;font-weight:800;color:var(--orange);width:14px;flex-shrink:0;}
.opt-row input{margin-bottom:0;}

/* ── LANG TOGGLE ── */
.lang-toggle{display:flex;gap:0;border-radius:6px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.15);flex-shrink:0;}
.lang-btn{background:rgba(255,255,255,.22);color:#fff;font-family:'Inter',sans-serif;font-size:.72rem;font-weight:700;border:none;padding:5px 11px;cursor:pointer;transition:background .15s;}
.lang-btn.active{background:#fff;color:var(--orange);}
.lang-btn:hover:not(.active){background:rgba(255,255,255,.38);}

/* ══════════════════════════════════
   GAME SCREEN
══════════════════════════════════ */

/* TOP BAR */
.topbar{
  background:var(--orange);
  padding:9px 14px;
  display:flex;align-items:center;gap:10px;
  flex-wrap:wrap;
  position:sticky;top:0;z-index:50;
  box-shadow:0 2px 8px rgba(0,0,0,.2);
}
.topbar-logo{font-size:1.1rem;font-weight:900;color:#fff;letter-spacing:-.5px;white-space:nowrap;}
.topbar-logo span{color:var(--dark);}
.topbar-ranking{display:flex;flex-wrap:wrap;gap:5px;flex:1;}
.rank-chip{
  display:flex;align-items:center;gap:5px;
  background:rgba(255,255,255,.18);border-radius:50px;
  padding:3px 10px;font-size:.72rem;font-weight:700;color:#fff;
  border:1.5px solid rgba(255,255,255,.15);white-space:nowrap;
  transition:background .2s;
}
.rank-chip.active-turn{background:rgba(255,255,255,.35);border-color:#fff;}
.rank-chip .rc-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.rank-chip .rc-level{font-size:.8rem;}

/* GAME BODY — 3 col: 50% board+sort | 20% order | 30% question */
.game-body{
  display:grid;
  grid-template-columns:5fr 2fr 3fr;
  grid-template-rows:auto;
  gap:10px;
  padding:12px;
  max-width:1400px;
  width:100%;
  margin:0 auto;
  align-self:stretch;
  align-items:start;
}

/* LEFT COLUMN: board + sorteador stacked */
.left-col{display:flex;flex-direction:column;gap:10px;}

/* SORTEADOR — horizontal bar */
.sorteador-bar{
  background:#fff;border-radius:var(--r);
  padding:16px 20px;
  box-shadow:var(--shadow);
  display:flex;align-items:center;gap:16px;
  flex-wrap:wrap;
}
.sorteador-bar .team-label{
  display:flex;align-items:center;gap:8px;
  font-size:.85rem;font-weight:700;white-space:nowrap;
}
.sorteador-bar .team-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;}
.sorteador-divider{width:1px;height:28px;background:#e8e8e8;flex-shrink:0;}
.sorteador-bar .casa-label{
  font-size:.78rem;font-weight:600;color:var(--muted);
  white-space:nowrap;
}
.sorteador-bar .slot-number{
  font-size:2.6rem;font-weight:900;
  color:#ddd;
  letter-spacing:-1px;
  line-height:1;
  min-width:54px;
  transition:color .15s;
}
.sorteador-bar .slot-number.landed{
  animation:landPop .35s ease;
}
@keyframes landPop{
  0%  {transform:scale(1.25);}
  60% {transform:scale(.92);}
  100%{transform:scale(1);}
}
.board-wrap{
  background:linear-gradient(135deg,#fff5ee 0%,#ffe8d6 50%,#fff0e6 100%);
  border-radius:16px;
  padding:14px;
  box-shadow:0 4px 24px rgba(255,102,0,.12),0 1px 4px rgba(0,0,0,.06);
  position:relative;
  overflow:hidden;
}
.board-wrap::before{
  content:'';
  position:absolute;inset:0;
  background:radial-gradient(ellipse at 20% 20%,rgba(255,102,0,.07) 0%,transparent 60%),
             radial-gradient(ellipse at 80% 80%,rgba(255,150,50,.06) 0%,transparent 55%);
  pointer-events:none;
}
.board-grid{
  display:grid;gap:6px;
  align-content:start;
  position:relative;z-index:1;
}
/* CELLS — glassmorphism */
.cell{
  border-radius:14px;
  height:clamp(64px,8vw,90px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:default;position:relative;
  transition:transform .18s ease,box-shadow .18s ease,background .2s;
  border:1.5px solid rgba(255,255,255,.85);
  background:rgba(255,255,255,.62);
  backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);
  box-shadow:0 2px 8px rgba(255,102,0,.06),inset 0 1px 0 rgba(255,255,255,.9);
  min-width:0;
  user-select:none;
  padding:2px 4px;
  text-align:center;
}
.cell:hover{
  transform:translateY(-3px) scale(1.04);
  box-shadow:0 8px 20px rgba(255,102,0,.18),inset 0 1px 0 rgba(255,255,255,.9);
  background:rgba(255,255,255,.85);
  z-index:2;
}
.cell.start{
  background:rgba(28,28,28,.85);
  border-color:rgba(28,28,28,.3);
  box-shadow:0 2px 8px rgba(0,0,0,.2);
}
.cell.start:hover{transform:none;box-shadow:0 2px 8px rgba(0,0,0,.2);}
/* open = neutral glass */
.cell.open{
  background:rgba(255,255,255,.62);
  border-color:rgba(255,255,255,.85);
}
/* active-q = currently being asked */
.cell.active-q{
  background:rgba(255,255,255,.92)!important;
  border:2px solid var(--orange)!important;
  box-shadow:0 0 0 3px rgba(255,102,0,.15),0 6px 18px rgba(255,102,0,.2)!important;
  transform:translateY(-3px) scale(1.06);
  z-index:3;
}
/* solved = team color with glow */
.cell.solved{
  color:#fff;
  border-color:transparent;
  box-shadow:0 4px 16px rgba(0,0,0,.2),inset 0 1px 0 rgba(255,255,255,.3);
}
.cell.solved:hover{
  transform:translateY(-2px) scale(1.03);
  box-shadow:0 8px 24px rgba(0,0,0,.25),inset 0 1px 0 rgba(255,255,255,.3);
}
/* Numbers */
.cell-num{font-size:clamp(.9rem,2vw,1.4rem);font-weight:800;color:rgba(180,120,80,.7);line-height:1;}
.cell.open .cell-num{color:rgba(180,120,80,.7);}
.cell.active-q .cell-num{color:var(--orange);}
.cell.solved .cell-num{color:rgba(255,255,255,.95);text-shadow:0 1px 4px rgba(0,0,0,.25);}
.cell.start .cell-num{color:rgba(255,255,255,.8);font-size:.75rem;}
.cell-icon{font-size:clamp(.7rem,1.6vw,1.1rem);line-height:1;}
.cell-answer{
  font-size:clamp(.42rem,.95vw,.68rem);
  font-weight:700;
  color:rgba(255,255,255,.95);
  text-shadow:0 1px 3px rgba(0,0,0,.3);
  line-height:1.2;
  margin-top:2px;
  word-break:break-word;
  overflow:hidden;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  max-width:100%;
}

/* MIDDLE — question + sorteador */
.mid-panel{display:flex;flex-direction:column;gap:10px;min-height:0;}
.panel-card{background:#fff;border-radius:var(--r);padding:14px;box-shadow:var(--shadow);}
.panel-title{font-size:.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid var(--line);}


/* INLINE QUESTION */
.q-panel-badge{display:inline-block;background:var(--orange);color:#fff;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:2px 9px;border-radius:4px;margin-bottom:8px;}
.q-panel-team{font-size:.78rem;font-weight:700;margin-bottom:6px;}
.q-panel-text{font-size:.88rem;font-weight:700;color:var(--dark);line-height:1.5;margin-bottom:10px;}
.q-opts{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;}
.opt-btn{background:#f7f7f7;border:1.5px solid #e5e5e5;border-radius:8px;padding:8px 12px;font-family:'Inter',sans-serif;font-size:.82rem;font-weight:600;color:var(--dark);cursor:pointer;text-align:left;display:flex;gap:8px;align-items:center;transition:border-color .12s,background .12s;}
.opt-btn:hover{border-color:var(--orange);background:var(--orange-xl);}
.opt-btn.correct{background:#e6f5ec;border-color:var(--green-ok);color:var(--green-ok);}
.opt-btn.wrong{background:#fdecea;border-color:var(--red-err);color:var(--red-err);}
.opt-key{font-weight:800;color:var(--orange);width:16px;flex-shrink:0;}
.q-result{font-size:.8rem;font-weight:700;padding:8px 10px;border-radius:6px;margin-bottom:8px;display:none;}
.q-result.ok{background:#e6f5ec;color:var(--green-ok);display:block;}
.q-result.no{background:#fdecea;color:var(--red-err);display:block;}

/* RIGHT — order + undiscovered */
.right-panel{display:flex;flex-direction:column;gap:10px;align-self:stretch;}
.right-panel .panel-card{flex:1;display:flex;flex-direction:column;}
.turn-members{margin-top:5px;padding-top:5px;border-top:1px solid var(--line);}
.turn-members-line{font-size:.62rem;color:var(--muted);line-height:1.4;}
.turn-row{display:flex;align-items:center;gap:7px;padding:7px 8px;border-radius:6px;font-size:.78rem;font-weight:600;margin-bottom:3px;transition:background .15s;}
.turn-row.cur{background:var(--orange-xl);}
.turn-row:hover{background:#f5f5f5;}
.turn-row.cur:hover{background:var(--orange-xl);}
.tr-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}

.disc-item{display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid #f0f0f0;font-size:.75rem;}
.disc-answer{font-weight:600;color:var(--dark);}
.disc-empty{font-size:.72rem;color:#bbb;font-style:italic;}

/* VICTORY */
.v-trophy{font-size:4rem;animation:vb 1s infinite alternate;}
@keyframes vb{from{transform:translateY(0)}to{transform:translateY(-9px)}}
.v-title{font-size:2rem;font-weight:900;color:#fff;letter-spacing:-1px;}
.v-sub{font-size:.9rem;color:rgba(255,255,255,.8);margin-bottom:4px;}
.podium{width:100%;max-width:500px;display:flex;flex-direction:column;gap:4px;}
.podium-row{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.15);border-radius:8px;padding:9px 14px;font-weight:700;font-size:.88rem;color:#fff;}
.podium-row.winner-row{background:rgba(255,255,255,.3);border:2px solid rgba(255,255,255,.5);}
.podium-pos{font-size:1.2rem;font-weight:800;width:28px;}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--dark);color:#fff;font-size:.8rem;font-weight:700;padding:8px 20px;border-radius:50px;z-index:300;animation:tin .25s ease,tout .25s ease 2.1s forwards;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.3);}
@keyframes tin{from{opacity:0;transform:translateX(-50%) translateY(12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes tout{from{opacity:1}to{opacity:0}}

@media(max-width:900px){
  .game-body{grid-template-columns:1fr 240px;grid-template-rows:auto auto;}
  .right-panel{grid-column:1/-1;flex-direction:row;flex-wrap:wrap;overflow-y:visible;}
  .right-panel .panel-card{flex:1 1 180px;}
}
@media(max-width:600px){
  .game-body{grid-template-columns:1fr;grid-template-rows:auto;}
  .mid-panel,.right-panel{grid-column:1;}
}
</style>
</head>
<body>

<!-- ══ SETUP ══ -->
<div id="setupScreen" class="screen active">
  <div style="width:100%;max-width:700px;padding-bottom:6px;">
    <div class="brand">
      <div>
        <div class="brand-logo">Beleza<span> em Jogo</span></div>
        <div class="brand-sub">Jogo de Tabuleiro</div>
      </div>
      <div class="lang-toggle">
        <button class="lang-btn active" id="btnPT" onclick="setLang('pt')">PT</button>
        <button class="lang-btn" id="btnES" onclick="setLang('es')">ES</button>
      </div>
    </div>
    <div class="setup-tagline" id="setupTagline">Relacionamento e Ativação Comercial</div>
  </div>

  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
      <div class="card-title" style="margin-bottom:0" id="card1Title"><span>01</span> Equipes</div>
      <button class="btn sm green" id="btnStartGame" onclick="startGame()">▶ Iniciar Jogo</button>
    </div>
    <div class="teams-wrap" id="teamsList"></div>
    <div id="membersEditor" style="margin-top:14px;"></div>
  </div>

  <div class="card">
    <div class="card-title" id="card2Title"><span>02</span> Perguntas</div>
    <p style="font-size:.78rem;color:var(--muted);margin-bottom:12px;" id="card2Desc">Cada pergunta deve ter 5 opções (A–E) e um gabarito definido.</p>
    <div id="questionBlocks"></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn ghost sm" onclick="addQuestion()" id="btnAddQ">+ Adicionar Pergunta</button>
      <button class="btn sm" onclick="fillSampleQuestions()" id="btnSample">⚡ Carregar Perguntas de Teste</button>
    </div>
    <p id="qCount" style="font-size:.72rem;color:var(--muted);margin-top:8px;"></p>
  </div>
  <p id="startError" style="font-size:.82rem;color:#fff;background:rgba(0,0,0,.2);padding:8px 14px;border-radius:6px;display:none;max-width:700px;width:100%;text-align:center;"></p>
</div>

<!-- ══ GAME ══ -->
<div id="gameScreen" class="screen">

  <!-- TOP BAR: logo + lang toggle -->
  <div class="topbar">
    <div class="topbar-logo">Beleza<span> em Jogo</span></div>
    <div style="flex:1"></div>
    <div class="lang-toggle" style="margin-left:6px;">
      <button class="lang-btn" id="btnPT2" onclick="setLang('pt')">PT</button>
      <button class="lang-btn" id="btnES2" onclick="setLang('es')">ES</button>
    </div>
  </div>

  <div class="game-body">

    <!-- COL 1 (50%): Board + Sorteador -->
    <div class="left-col">
      <div class="board-wrap">
        <div class="board-grid" id="boardGrid"></div>
      </div>
      <div class="sorteador-bar" id="sorteadorBar">
        <div class="team-label">
          <div class="team-dot" id="sortTeamDot"></div>
          <span id="sortTeamName" style="font-weight:800">—</span>
          <button class="btn sm" id="btnSortear" onclick="autoSort()" style="margin-left:6px;">🎲 Sortear!</button>
        </div>
        <div class="sorteador-divider"></div>
        <div class="casa-label" id="casaLabel">Casa sorteada:</div>
        <div class="slot-number" id="slotNumber">—</div>
      </div>
    </div>

    <!-- COL 2 (20%): Turn order — full height, members always shown -->
    <div class="right-panel">
      <div class="panel-card">
        <div class="panel-title" id="panelOrderTitle">Ordem de Jogo</div>
        <div id="turnOrderList"></div>
      </div>
    </div>

    <!-- COL 3 (30%): Question — same height as col2 -->
    <div class="panel-card" id="questionPanel" style="visibility:hidden;align-self:stretch;">
      <div class="q-panel-badge" id="qBadge">Casa 1</div>
      <div class="q-panel-team" id="qTeam"></div>
      <div class="q-panel-text" id="qText"></div>
      <div class="q-opts" id="qOpts"></div>
      <div class="q-result" id="qResult"></div>
      <div id="qActions"></div>
    </div>

  </div>
</div>

<!-- ══ VICTORY ══ -->
<div id="victoryScreen" class="screen">
  <div class="v-trophy">🏆</div>
  <div class="v-title" id="vTitle">Jogo Concluído!</div>
  <div class="v-sub" id="vSub">Todas as casas foram respondidas</div>
  <div class="podium" id="podium"></div>
  <div id="victoryUndiscovered"></div>
  <button class="btn white" onclick="resetGame()" style="margin-top:20px;" id="btnReset">↺ Jogar Novamente</button>
</div>

<script>
// ══════════════════════════════════════════════════════
//  LANGUAGE (declared first — no hoisting issues)
// ══════════════════════════════════════════════════════
let LANG = 'pt';
const UI = {
  brandLogo:     {pt:'Beleza<span> em Jogo</span>',          es:'Belleza<span> en Juego</span>'},
  setupTagline:  {pt:'Relacionamento e Ativação Comercial', es:'Relacionamiento y Activación Comercial'},
  card1Title:    {pt:'<span>01</span> Equipes',              es:'<span>01</span> Equipos'},
  card2Title:    {pt:'<span>02</span> Perguntas',            es:'<span>02</span> Preguntas'},
  card2Desc:     {pt:'Cada pergunta deve ter 5 opções (A–E) e um gabarito definido.', es:'Cada pregunta debe tener 5 opciones (A–E) y una respuesta correcta.'},
  btnAddQ:       {pt:'+ Adicionar Pergunta',                 es:'+ Agregar Pregunta'},
  btnSample:     {pt:'⚡ Carregar Perguntas de Teste',        es:'⚡ Cargar Preguntas de Prueba'},
  btnStart:      {pt:'▶ Iniciar Jogo',                       es:'▶ Iniciar Juego'},
  panelSort:     {pt:'Sorteio de Casa',                      es:'Sorteo de Casilla'},
  turnWho:       {pt:'Vez de:',                              es:'Turno de:'},
  panelOrder:    {pt:'Ordem de Jogo',                        es:'Orden de Juego'},

function buildSampleQuestions(){
  return RAW_QA.map((item,i)=>{
    const pos=i%5;
    const others=POOL.filter(p=>p!==item.correct);
    for(let j=others.length-1;j>0;j--){const k=Math.floor(Math.random()*(j+1));[others[j],others[k]]=[others[k],others[j]];}
    const arr=[...others.slice(0,4)];
    arr.splice(pos,0,item.correct);
    const opts={};
    LETTERS.forEach((l,li)=>{opts[l]=arr[li];});
    return{pt:item.pt,es:item.es,text:item.pt,opts,correct:LETTERS[pos]};
  });
}

//  SORTEADOR (slot-machine animation)
// ══════════════════════════════════════════════════════
function renderNumbersGrid(){
  // Just enable/disable the button — no number grid anymore
  const btn=document.getElementById('btnSortear');
  if(btn){
    const locked=gameState.picked!==null;
    btn.disabled=locked;
    btn.style.opacity=locked?'.4':'1';
    btn.style.cursor=locked?'not-allowed':'pointer';
  }
}

function autoSort(){
  if(gameState.picked!==null) return;

  const available=gameState.cells
    .map((c,i)=>c.solved?null:i+1)
    .filter(n=>n!==null);
  if(!available.length) return;

  const target=available[Math.floor(Math.random()*available.length)];

  // Disable button during animation
  const btn=document.getElementById('btnSortear');
  if(btn){btn.disabled=true;btn.style.opacity='.4';}

  const slotEl=document.getElementById('slotNumber');
  slotEl.classList.remove('landed');

  // Build flicker sequence: 10-12 random numbers ending on target
  const flickerCount=10+Math.floor(Math.random()*5);
  const allNums=Array.from({length:24},(_,i)=>i+1);
  const sequence=[];
  for(let i=0;i<flickerCount;i++){
    let n;
    do{ n=allNums[Math.floor(Math.random()*allNums.length)]; }
    while(sequence.length>0&&n===sequence[sequence.length-1]);
    sequence.push(n);
  }
  sequence.push(target);

  // Animate: fast at start, slow at end
  let idx=0;
  function tick(){
    slotEl.textContent=sequence[idx];
    idx++;
    if(idx<sequence.length){
      // Ease: start at 60ms, slow to 200ms over last 4 steps
      const remaining=sequence.length-idx;
      const delay=remaining>4?60:60+(4-remaining)*40;
      setTimeout(tick,delay);
    } else {
      // Landed — use team color
      const teamColor=currentTeam()?.color||'var(--orange)';
      slotEl.style.color=teamColor;
      slotEl.classList.add('landed');
      gameState.picked=target;
      gameState.cells[target-1].open=true;
      refreshCell(target);
      setTimeout(()=>openQuestion(target),400);
    }
  }
  tick();
}

  mState.answered=true;

  const team=mState.team;

    const b=document.getElementById(`ob_${l}`);
    if(b){
      b.onclick=null;
      if(chosen===correct){if(l===correct)b.classList.add('correct');}
      else{if(l===chosen)b.classList.add('wrong');}
    }
  });

  const r=document.getElementById('qResult');
  r.style.display='block'; // force show before setting class

  if(chosen===correct){
    const ansText=q.opts[correct]||correct;
    // Capture level BEFORE updating score
    const gs_team=gameState.teams.find(t=>t.id===team.id);
    const lvBefore=getLevel(gs_team?gs_team.acertos:0);
    // Update cell
    gameState.cells[mState.cellNum-1].solved=true;
    gameState.cells[mState.cellNum-1].solvedByTeam={name:team.name,color:team.color};
    gameState.cells[mState.cellNum-1].answerText=ansText;
    // Update team score
    if(gs_team){
      gs_team.acertos++;
      gs_team.acertoOrder=gameState.totalAcertos=(gameState.totalAcertos||0)+1;
    }
    const lvAfter=getLevel(gs_team?gs_team.acertos:0);
    // Personalized message
    const evolved=lvAfter.name!==lvBefore.name;
    const msg=evolved
      ? `🎉 ${team.name} vendeu mais um produto e virou ${lvAfter.name}! ${lvAfter.emoji}`
      : gs_team?.acertos===1
        ? `${team.name} fechou o primeiro pedido! 🌱`
        : `✓ ${team.name} vendeu mais um produto! ${lvAfter.emoji}`;
    r.textContent=msg;
    r.className='q-result ok';
    refreshCell(mState.cellNum);
    renderTopbarRanking();
    renderTurnOrder();
  } else {
    const gs_team=gameState.teams.find(t=>t.id===team.id);
    const lv=getLevel(gs_team?gs_team.acertos:0);
    r.textContent=`${team.name} não vendeu e não evoluiu no plano de crescimento. ${lv.emoji}`;
    r.className='q-result no';
    // Remove active-q highlight from cell immediately
    gameState.picked=null;
    refreshCell(mState.cellNum);
  }

  document.getElementById('qActions').innerHTML=`
    <button class="btn confirm sm" style="width:100%" onclick="continueGame()">${tr('continueBtn')}</button>`;
}

function continueGame(){
  document.getElementById('questionPanel').style.visibility='hidden';

  // Check if all 24 houses solved
  const allSolved=gameState.cells.every(c=>c.solved);
  if(allSolved){
    toast(tr('toastAll'));
    setTimeout(showVictory,1000);
    return;
  }

  // Advance turn
  gameState.picked=null;
  gameState.answered=false;
  advanceTurn();
  renderBoard(); // refresh active-q highlight
  renderNumbersGrid();
}

// ══════════════════════════════════════════════════════
//  TURNS
// ══════════════════════════════════════════════════════
function currentTeam(){
  if(!gameState)return null;
  const id=gameState.order[gameState.curIdx%gameState.order.length];
  return gameState.teams.find(tm=>tm.id===id);
}
function advanceTurn(){
  const total=gameState.order.length;
  gameState.curIdx=(gameState.curIdx+1)%total;
  updateTurnLabel();
  renderTurnOrder();
}
function updateTurnLabel(){
  const tm=currentTeam();
  // Legacy turn-name (kept in case used elsewhere)
  const el=document.getElementById('turnName');
  if(el&&tm){el.textContent=tm.name;el.style.color=tm.color;}
  // Sorteador bar
  const dot=document.getElementById('sortTeamDot');
  const name=document.getElementById('sortTeamName');
  if(dot&&tm) dot.style.background=tm.color;
  if(name&&tm){name.textContent=tm.name;name.style.color=tm.color;}
  // Reset slot display for new turn
  const slot=document.getElementById('slotNumber');
  if(slot){slot.textContent='—';slot.style.color='#ddd';slot.classList.remove('landed');}
}

// ══════════════════════════════════════════════════════
//  TOPBAR RANKING (removed — kept as no-op for safety)
// ══════════════════════════════════════════════════════
function renderTopbarRanking(){ /* removed per user request */ }

// ══════════════════════════════════════════════════════
//  TURN ORDER LIST
// ══════════════════════════════════════════════════════
// ══════════════════════════════════════════════════════
//  TURN ORDER LIST — members always visible
// ══════════════════════════════════════════════════════
function renderTurnOrder(){
  const curId=currentTeam()?.id;
  document.getElementById('turnOrderList').innerHTML=gameState.order.map(id=>{
    const tm=gameState.teams.find(x=>x.id===id);
    const lv=getLevel(tm.acertos);
    const members=(tm.members||[]).filter(m=>m.trim());
    const membersHtml=members.length
      ?`<div class="turn-members"><span class="turn-members-line">${members.join(' / ')}</span></div>`
      :'';
    return`<div class="turn-row${tm.id===curId?' cur':''}" style="flex-direction:column;align-items:stretch;">
        <div style="display:flex;align-items:center;gap:7px;width:100%">
          <div class="tr-dot" style="background:${tm.color}"></div>
          <span style="flex:1;font-weight:500">${tm.name}</span>
          <span>${lv.emoji}</span>
          <span style="font-size:.7rem;color:var(--muted)">${tm.acertos} ✓</span>
        </div>
        ${membersHtml}
      </div>`;
  }).join('');
}

// ══════════════════════════════════════════════════════
function renderUndiscovered(){
  const unsolved=[];
  for(let i=0;i<BOARD_SIZE;i++){
    const c=gameState.cells[i];
    if(!c.solved){
      const q=questions[i];
      const ans=q?.opts[q?.correct]||'';
      if(ans)unsolved.push(ans);
    }
  }
  const el=document.getElementById('undiscoveredList');
  if(!unsolved.length){el.innerHTML=`<div class="disc-empty">${tr('allDiscovered')}</div>`;return;}
  const shuffled=[...unsolved].sort(()=>Math.random()-.5);
  el.innerHTML=shuffled.map(ans=>`
    <div class="disc-item">
      <span class="disc-answer">${escHtml(ans)}</span>
    </div>`).join('');
}

// ══════════════════════════════════════════════════════
//  VICTORY
// ══════════════════════════════════════════════════════
function showVictory(){
  showScreen('victoryScreen');

  // Ranking: most acertos wins; tiebreak = who reached their last acerto first (lower acertoOrder = sooner)
  const sorted=[...gameState.teams].sort((a,b)=>{
    if(b.acertos !== a.acertos) return b.acertos - a.acertos;
    return (a.acertoOrder||999) - (b.acertoOrder||999);
  });

  document.getElementById('vTitle').textContent='Jogo Concluído!';
  document.getElementById('vSub').textContent='Relacionamento & Ativação Comercial';

  const ordinals=['1º','2º','3º','4º','5º','6º'];
  const headerRow=`<div style="display:flex;gap:10px;padding:6px 14px;font-size:.68rem;font-weight:700;color:rgba(255,255,255,.55);text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid rgba(255,255,255,.15);margin-bottom:4px;">
    <span style="width:36px;flex-shrink:0">Lugar</span>
    <span style="flex:1">Equipe</span>
    <span style="white-space:nowrap">Produtos Vendidos</span>
  </div>`;
  document.getElementById('podium').innerHTML=headerRow+sorted.map((tm,i)=>{
    const lv=getLevel(tm.acertos);
    const members=(tm.members||[]).filter(m=>m.trim());
    const membersLine=members.length
      ?`<div style="font-size:.68rem;color:rgba(255,255,255,.65);margin-top:2px;font-weight:500">${members.join(' | ')}</div>`
      :'';
    return`<div class="podium-row${i===0?' winner-row':''}">
      <span class="podium-pos" style="width:36px;flex-shrink:0">${ordinals[i]||`${i+1}º`}</span>
      <div class="tr-dot" style="background:${tm.color};width:13px;height:13px;border-radius:50%;flex-shrink:0"></div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:${i===0?800:600}">${tm.name} ${lv.emoji}</div>
        ${membersLine}
      </div>
      <span style="font-size:.95rem;font-weight:800;color:#fff;text-align:right;white-space:nowrap">${tm.acertos}</span>
    </div>`;
  }).join('');

  document.getElementById('victoryUndiscovered').innerHTML='';
}

// ══════════════════════════════════════════════════════
//  RESET
// ══════════════════════════════════════════════════════
function resetGame(){
  questions=[];qCount=0;gameState=null;openEditorId=null;
  document.getElementById('questionBlocks').innerHTML='';
  updateQCount(); initTeams();
  showScreen('setupScreen');
}

// ══════════════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════════════
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function toast(msg){
  const el=document.createElement('div');el.className='toast';el.textContent=msg;
  document.body.appendChild(el);setTimeout(()=>el.remove(),2500);
}
function escHtml(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ══════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════
updateQCount();
initTeams();
applyStaticLang();
</script>
